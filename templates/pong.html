<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <style>
    :root {
      --game-bg: #000;
      --panel-bg: #111;
      --panel-muted: #333;
      --panel-border: #ccc;
      --accent: #4CAF50;
      --text: #fff;
      --button-bg: #333;
      --button-hover: #555;
      --danger: #f66;
      --danger-hover: #d55;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--game-bg);
      color: var(--text);
      font-family: sans-serif;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body {
      box-sizing: border-box;
      min-height: 100dvh;
      padding-top: calc(max(env(safe-area-inset-top, 0px), var(--tg-safe-top, 0px)) + var(--tg-overlay-top, 0px)) !important;
      padding-right: max(env(safe-area-inset-right, 0px), var(--tg-safe-right, 0px)) !important;
      padding-bottom: max(env(safe-area-inset-bottom, 0px), var(--tg-safe-bottom, 0px)) !important;
      padding-left: max(env(safe-area-inset-left, 0px), var(--tg-safe-left, 0px)) !important;
    }

    * {
      box-sizing: border-box;
    }

    header {
      width: 100%;
      min-height: 56px;
      background: var(--accent);
      color: var(--text);
      text-align: center;
      padding: 10px 56px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-button {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      text-decoration: none;
      background: var(--button-bg);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
    }

    .back-button:hover {
      background: var(--button-hover);
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .instructions {
      margin: 10px 12px;
      font-size: 14px;
      background: var(--panel-muted);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      line-height: 1.4;
      width: min(100% - 24px, 500px);
      max-width: 500px;
      text-align: center;
    }

    #score {
      margin: 8px 12px 10px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    #pongContainer {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 624px;
      padding: 0 12px 20px;
    }

    canvas {
      width: 100%;
      max-width: 600px;
      height: auto;
      border: 2px solid var(--panel-border);
      background: #111;
      display: block;
    }

    #gameOver {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.82);
      color: var(--text);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      display: none;
      z-index: 2;
      min-width: 220px;
    }

    #gameOver button {
      margin-top: 10px;
      padding: 10px 16px;
      background: var(--danger);
      border: none;
      cursor: pointer;
      color: var(--text);
      border-radius: 5px;
      font-size: 16px;
    }

    #gameOver button:hover {
      background: var(--danger-hover);
    }
  </style>
</head>
<body>

<header>
  <a class="back-button" href="/">Назад</a>
  <h1>Pong</h1>
</header>

<div class="instructions">
  Тяни пальцем или мышью по <b>левой половине поля</b>, чтобы двигать ракетку.<br>
  Правой ракеткой управляет ИИ. Игра заканчивается при 5 очках.
</div>

<div id="score">0 : 0</div>

<div id="pongContainer">
  <canvas id="pongCanvas" width="600" height="400"></canvas>
  <div id="gameOver">
    <h2 id="finalScore">Счёт:</h2>
    <button onclick="restartGame()">Играть снова</button>
  </div>
</div>

<script>
  document.addEventListener("touchmove", e => e.preventDefault(), { passive:false });
  document.addEventListener("selectstart", e => e.preventDefault());

  const canvas = document.getElementById("pongCanvas");
  const ctx = canvas.getContext("2d");

  let paddleHeight = 70;
  let paddleWidth = 10;

  let leftPaddleY, rightPaddleY;
  let ballX, ballY;
  let ballSize = 8;
  let ballSpeedX, ballSpeedY;

  // === НАСТРОЙКА ИГРЫ: меняй значения здесь ===
  const maxScore = 5;
  const serveCountdownStepMs = 260; // скорость отсчёта 3-2-1
  const ballBaseSpeed = 2.7; // стартовая скорость мяча
  const ballSpeedIncrease = 1.25; // ускорение после каждого отскока
  const maxBallSpeed = 7.2; // максимальная скорость мяча
  const maxBounceAngle = Math.PI / 3; // максимальный угол отскока (60°)
  const aiBaseSpeed = 1.7; // скорость бота, когда мяч не летит к нему
  const aiTrackSpeed = 2.55; // скорость бота, когда мяч летит к нему
  const aiReactionMs = 125; // реакция бота: больше = слабее
  const aiMistakePx = 22; // погрешность бота: больше = слабее
  const aiDeadZone = 7;

  let leftScore = 0;
  let rightScore = 0;
  let isGameOver = false;
  let isRoundPaused = false;
  let countdownValue = "";
  let aiTargetY = 0;
  let aiLastRetargetAt = 0;
  let serveDirection = 1;
  let roundTimers = [];
  let animationFrameId;
  let isPointerDown = false;

  function clearRoundTimers() {
    for (const timerId of roundTimers) {
      clearTimeout(timerId);
    }
    roundTimers = [];
  }

  function initGame() {
    leftPaddleY = canvas.height / 2 - paddleHeight / 2;
    rightPaddleY = canvas.height / 2 - paddleHeight / 2;
    leftScore = 0;
    rightScore = 0;
    isGameOver = false;
    isRoundPaused = false;
    countdownValue = "";
    aiTargetY = canvas.height / 2 - paddleHeight / 2;
    aiLastRetargetAt = 0;
    clearRoundTimers();
    startServeCountdown(Math.random() > 0.5 ? 1 : -1);
  }

  function placeBallAtCenter() {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
    ballSpeedX = 0;
    ballSpeedY = 0;
  }

  function resetBall(direction = (Math.random() > 0.5 ? 1 : -1)) {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;

    const angle = Math.random() * 1.1 - 0.55;
    ballSpeedX = ballBaseSpeed * direction;
    ballSpeedY = ballBaseSpeed * angle;
  }

  function startServeCountdown(direction = (Math.random() > 0.5 ? 1 : -1)) {
    serveDirection = direction;
    isRoundPaused = true;
    countdownValue = 3;
    placeBallAtCenter();
    rightPaddleY = canvas.height / 2 - paddleHeight / 2;
    aiTargetY = rightPaddleY;
    aiLastRetargetAt = 0;

    clearRoundTimers();

    roundTimers.push(setTimeout(() => {
      countdownValue = 2;
    }, serveCountdownStepMs));

    roundTimers.push(setTimeout(() => {
      countdownValue = 1;
    }, serveCountdownStepMs * 2));

    roundTimers.push(setTimeout(() => {
      countdownValue = "";
      isRoundPaused = false;
      resetBall(serveDirection);
    }, serveCountdownStepMs * 3));
  }

  function handlePaddleBounce(paddleY, direction) {
    const paddleCenterY = paddleY + paddleHeight / 2;
    const relativeImpact = (ballY - paddleCenterY) / (paddleHeight / 2);
    const clampedImpact = Math.max(-1, Math.min(1, relativeImpact));
    const bounceAngle = clampedImpact * maxBounceAngle;
    const currentSpeed = Math.hypot(ballSpeedX, ballSpeedY);
    const nextSpeed = Math.min(maxBallSpeed, Math.max(ballBaseSpeed, currentSpeed * ballSpeedIncrease));

    ballSpeedX = Math.cos(bounceAngle) * nextSpeed * direction;
    ballSpeedY = Math.sin(bounceAngle) * nextSpeed;

    if (direction > 0) {
      ballX = paddleWidth + ballSize + 0.5;
    } else {
      ballX = canvas.width - paddleWidth - ballSize - 0.5;
    }
  }

  function handleGoal(scoredBy) {
    if (scoredBy === "left") {
      leftScore++;
    } else {
      rightScore++;
    }

    checkScore();
    if (isGameOver) return;

    startServeCountdown(Math.random() > 0.5 ? 1 : -1);
  }

  function updateAi() {
    const now = performance.now();
    const ballGoingToAi = ballSpeedX > 0 && ballX > canvas.width * 0.35;
    const idleY = canvas.height / 2 - paddleHeight / 2;
    const targetBaseY = ballGoingToAi ? ballY - paddleHeight / 2 : idleY;
    const mistakeRange = ballGoingToAi ? aiMistakePx : aiMistakePx * 1.35;

    if (now - aiLastRetargetAt >= aiReactionMs) {
      aiLastRetargetAt = now;
      aiTargetY = targetBaseY + (Math.random() * mistakeRange - mistakeRange / 2);
    }

    if (aiTargetY < 0) aiTargetY = 0;
    if (aiTargetY > canvas.height - paddleHeight) aiTargetY = canvas.height - paddleHeight;

    const step = ballGoingToAi ? aiTrackSpeed : aiBaseSpeed;
    const delta = aiTargetY - rightPaddleY;

    if (Math.abs(delta) > aiDeadZone) {
      rightPaddleY += Math.sign(delta) * Math.min(Math.abs(delta), step);
    }

    if (rightPaddleY < 0) rightPaddleY = 0;
    if (rightPaddleY > canvas.height - paddleHeight) rightPaddleY = canvas.height - paddleHeight;
  }

  function update() {
    if (isGameOver) return;

    if (!isRoundPaused) {
      ballX += ballSpeedX;
      ballY += ballSpeedY;

      if (ballY - ballSize < 0 || ballY + ballSize > canvas.height) {
        ballSpeedY = -ballSpeedY;
      }

      if (ballX - ballSize < paddleWidth) {
        if (ballY + ballSize > leftPaddleY && ballY - ballSize < leftPaddleY + paddleHeight) {
          handlePaddleBounce(leftPaddleY, 1);
        } else {
          handleGoal("right");
          draw();
          animationFrameId = requestAnimationFrame(update);
          return;
        }
      }

      updateAi();

      if (ballX + ballSize > canvas.width - paddleWidth) {
        if (ballY + ballSize > rightPaddleY && ballY - ballSize < rightPaddleY + paddleHeight) {
          handlePaddleBounce(rightPaddleY, -1);
        } else {
          handleGoal("left");
          draw();
          animationFrameId = requestAnimationFrame(update);
          return;
        }
      }
    }

    draw();
    animationFrameId = requestAnimationFrame(update);
  }

  function checkScore() {
    if (leftScore >= maxScore || rightScore >= maxScore) {
      isGameOver = true;
      isRoundPaused = false;
      countdownValue = "";
      clearRoundTimers();
      document.getElementById("finalScore").textContent = `Счёт: ${leftScore} : ${rightScore}`;
      document.getElementById("gameOver").style.display = "block";
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, leftPaddleY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleWidth, rightPaddleY, paddleWidth, paddleHeight);

    ctx.beginPath();
    ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();

    if (isRoundPaused && !isGameOver) {
      ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "bold 72px sans-serif";
      ctx.fillText(String(countdownValue), canvas.width / 2, canvas.height / 2 + 24);
    }

    document.getElementById("score").textContent = `${leftScore} : ${rightScore}`;
  }

  function restartGame() {
    document.getElementById("gameOver").style.display = "none";
    clearRoundTimers();
    cancelAnimationFrame(animationFrameId);
    initGame();
    animationFrameId = requestAnimationFrame(update);
  }

  function getCanvasPointerPosition(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function moveLeftPaddle(pointerY) {
    let newY = pointerY - paddleHeight / 2;
    if (newY < 0) newY = 0;
    if (newY > canvas.height - paddleHeight) newY = canvas.height - paddleHeight;
    leftPaddleY = newY;
  }

  canvas.addEventListener("pointerdown", e => {
    const pos = getCanvasPointerPosition(e);
    if (pos.x <= canvas.width / 2) {
      isPointerDown = true;
      canvas.setPointerCapture?.(e.pointerId);
      moveLeftPaddle(pos.y);
    }
  });

  canvas.addEventListener("pointermove", e => {
    if (!isPointerDown) return;
    const pos = getCanvasPointerPosition(e);
    moveLeftPaddle(pos.y);
  });

  canvas.addEventListener("pointerup", e => {
    isPointerDown = false;
    canvas.releasePointerCapture?.(e.pointerId);
  });

  canvas.addEventListener("pointercancel", e => {
    isPointerDown = false;
    canvas.releasePointerCapture?.(e.pointerId);
  });

  canvas.addEventListener("pointerleave", () => {
    isPointerDown = false;
  });

  restartGame();
</script>

<script>
  (function setupFullscreenBackFix() {
    const backButton = document.querySelector('.back-button');
    const tg = window.Telegram && window.Telegram.WebApp;
    if (!backButton || !tg) return;

    function handleBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }

    function apply() {
      const safe = tg.contentSafeAreaInset || tg.safeAreaInset || {};
      const isFullscreen = tg.isFullscreen === true || (Number(safe.top) || 0) >= 24;
      backButton.style.display = isFullscreen ? 'none' : 'inline-flex';

      if (!tg.BackButton) return;
      if (typeof tg.BackButton.offClick === 'function') tg.BackButton.offClick(handleBack);
      if (isFullscreen) {
        if (typeof tg.BackButton.onClick === 'function') tg.BackButton.onClick(handleBack);
        if (typeof tg.BackButton.show === 'function') tg.BackButton.show();
      } else if (typeof tg.BackButton.hide === 'function') {
        tg.BackButton.hide();
      }
    }

    tg.ready();
    apply();
    setTimeout(apply, 150);
    setTimeout(apply, 500);

    if (tg.onEvent) {
      tg.onEvent('viewportChanged', apply);
      tg.onEvent('safeAreaChanged', apply);
      tg.onEvent('contentSafeAreaChanged', apply);
      tg.onEvent('fullscreenChanged', apply);
    }

    window.addEventListener('resize', apply, { passive: true });
    window.addEventListener('orientationchange', apply, { passive: true });
  })();
</script>
</body>
</html>
