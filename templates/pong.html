<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pong</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <style>
    html, body {
      margin:0;
      padding:0;
      width:100%;
      background:#000;
      color:#fff;
      font-family:sans-serif;
      overscroll-behavior:none;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
      user-select:none;
      touch-action:none;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    body {
      min-height: 100dvh;
    }
    header {
      width:100%;
      background:#4CAF50;
      color:#fff;
      text-align:center;
      padding:10px;
      position:relative;
      box-sizing:border-box;
    }
    .back-button {
      position:absolute;
      left:10px;
      top:10px;
      text-decoration:none;
      background:#333;
      color:#fff;
      padding:6px 12px;
      border-radius:4px;
      font-size:14px;
    }
    .back-button:hover {
      background:#555;
    }
    h1 {
      margin:0;
      font-size:20px;
    }
    .instructions {
      margin:10px;
      font-size:14px;
      background:#333;
      padding:6px 10px;
      border-radius:4px;
      line-height:1.4;
      max-width:500px;
      text-align:center;
    }
    #score {
      margin:10px;
      font-size:20px;
    }
    #pongContainer {
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      max-width:640px;
      padding:0 12px 20px;
      box-sizing:border-box;
    }
    canvas {
      width:100%;
      max-width:600px;
      height:auto;
      border:2px solid #ccc;
      background:#111;
      display:block;
    }
    #gameOver {
      position:absolute;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.7);
      color:#fff;
      padding:20px;
      border-radius:8px;
      text-align:center;
      display:none;
      z-index:2;
    }
    #gameOver button {
      margin-top:10px;
      padding:8px 16px;
      background:#f66;
      border:none;
      cursor:pointer;
      color:#fff;
      border-radius:5px;
      font-size:16px;
    }
    #gameOver button:hover {
      background:#d55;
    }
  </style>
</head>
<body>

<header>
  <a class="back-button" href="/">Назад</a>
  <h1>Pong</h1>
</header>

<div class="instructions">
  Тяни пальцем или мышью по левой части поля, чтобы двигать ракетку.<br>
  Справа играет ИИ. Матч идёт до 5 очков.
</div>

<div id="score">0 : 0</div>

<div id="pongContainer">
  <canvas id="pongCanvas" width="600" height="400"></canvas>
  <div id="gameOver">
    <h2 id="finalScore">Счёт:</h2>
    <button onclick="restartGame()">Играть снова</button>
  </div>
</div>

<script>
  document.addEventListener("touchmove", function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener("selectstart", function(e){ e.preventDefault(); });

  const canvas = document.getElementById("pongCanvas");
  const ctx = canvas.getContext("2d");

  const paddleHeight = 76;
  const paddleWidth = 10;
  const paddleInset = 8;
  const ballSize = 8;
  const maxScore = 5;
  const aiSpeed = 3.1;

  let leftPaddleY;
  let rightPaddleY;
  let ballX;
  let ballY;
  let ballSpeedX;
  let ballSpeedY;
  let leftScore = 0;
  let rightScore = 0;
  let isGameOver = false;
  let animationFrameId = null;
  let activePointerId = null;

  function initGame() {
    leftPaddleY = canvas.height / 2 - paddleHeight / 2;
    rightPaddleY = canvas.height / 2 - paddleHeight / 2;
    leftScore = 0;
    rightScore = 0;
    isGameOver = false;
    resetBall(Math.random() > 0.5 ? 1 : -1);
    draw();
  }

  function resetBall(direction) {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;

    const verticalSeed = (Math.random() * 2 - 1) * 1.6;
    ballSpeedX = 3.3 * direction;
    ballSpeedY = verticalSeed || 1.1;
  }

  function clampPaddles() {
    leftPaddleY = Math.max(0, Math.min(leftPaddleY, canvas.height - paddleHeight));
    rightPaddleY = Math.max(0, Math.min(rightPaddleY, canvas.height - paddleHeight));
  }

  function scorePoint(side) {
    if (side === "left") {
      leftScore++;
      checkScore();
      if (!isGameOver) resetBall(1);
    } else {
      rightScore++;
      checkScore();
      if (!isGameOver) resetBall(-1);
    }
  }

  function update() {
    if (isGameOver) return;

    ballX += ballSpeedX;
    ballY += ballSpeedY;

    if (ballY - ballSize <= 0) {
      ballY = ballSize;
      ballSpeedY = Math.abs(ballSpeedY);
    } else if (ballY + ballSize >= canvas.height) {
      ballY = canvas.height - ballSize;
      ballSpeedY = -Math.abs(ballSpeedY);
    }

    const rightCenter = rightPaddleY + paddleHeight / 2;
    if (rightCenter < ballY - 6) {
      rightPaddleY += aiSpeed;
    } else if (rightCenter > ballY + 6) {
      rightPaddleY -= aiSpeed;
    }

    clampPaddles();

    const leftPaddleX = paddleInset;
    const rightPaddleX = canvas.width - paddleInset - paddleWidth;

    if (
      ballSpeedX < 0 &&
      ballX - ballSize <= leftPaddleX + paddleWidth &&
      ballX + ballSize >= leftPaddleX &&
      ballY + ballSize >= leftPaddleY &&
      ballY - ballSize <= leftPaddleY + paddleHeight
    ) {
      ballX = leftPaddleX + paddleWidth + ballSize;
      const offset = (ballY - (leftPaddleY + paddleHeight / 2)) / (paddleHeight / 2);
      ballSpeedX = Math.abs(ballSpeedX) * 1.04;
      ballSpeedY = offset * 4.2;
    } else if (ballX + ballSize < 0) {
      scorePoint("right");
    }

    if (
      ballSpeedX > 0 &&
      ballX + ballSize >= rightPaddleX &&
      ballX - ballSize <= rightPaddleX + paddleWidth &&
      ballY + ballSize >= rightPaddleY &&
      ballY - ballSize <= rightPaddleY + paddleHeight
    ) {
      ballX = rightPaddleX - ballSize;
      const offset = (ballY - (rightPaddleY + paddleHeight / 2)) / (paddleHeight / 2);
      ballSpeedX = -Math.abs(ballSpeedX) * 1.04;
      ballSpeedY = offset * 4.2;
    } else if (ballX - ballSize > canvas.width) {
      scorePoint("left");
    }

    draw();
    animationFrameId = requestAnimationFrame(update);
  }

  function checkScore() {
    if (leftScore >= maxScore || rightScore >= maxScore) {
      isGameOver = true;
      document.getElementById("finalScore").textContent = "Счёт: " + leftScore + " : " + rightScore;
      document.getElementById("gameOver").style.display = "block";
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(paddleInset, leftPaddleY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleInset - paddleWidth, rightPaddleY, paddleWidth, paddleHeight);

    ctx.beginPath();
    ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.setLineDash([10, 10]);
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);

    document.getElementById("score").textContent = leftScore + " : " + rightScore;
  }

  function restartGame() {
    document.getElementById("gameOver").style.display = "none";
    cancelAnimationFrame(animationFrameId);
    initGame();
    animationFrameId = requestAnimationFrame(update);
  }

  function getCanvasPointerPosition(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function moveLeftPaddle(pointerY) {
    leftPaddleY = pointerY - paddleHeight / 2;
    clampPaddles();
  }

  canvas.addEventListener("pointerdown", function(e) {
    const pos = getCanvasPointerPosition(e);

    if (pos.x <= canvas.width * 0.62) {
      activePointerId = e.pointerId;
      if (canvas.setPointerCapture) {
        canvas.setPointerCapture(e.pointerId);
      }
      moveLeftPaddle(pos.y);
    }
  });

  canvas.addEventListener("pointermove", function(e) {
    if (activePointerId !== e.pointerId) return;
    const pos = getCanvasPointerPosition(e);
    moveLeftPaddle(pos.y);
  });

  function releasePointer(e) {
    if (activePointerId !== e.pointerId) return;
    activePointerId = null;
    if (canvas.releasePointerCapture) {
      canvas.releasePointerCapture(e.pointerId);
    }
  }

  canvas.addEventListener("pointerup", releasePointer);
  canvas.addEventListener("pointercancel", releasePointer);
  canvas.addEventListener("pointerleave", function(e) {
    if (activePointerId === e.pointerId && e.pressure === 0) {
      activePointerId = null;
    }
  });

  restartGame();
</script>
</body>
</html>
