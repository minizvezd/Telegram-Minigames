<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Pong (Drag на левой половине)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <style>
    html, body {
      margin:0;
      padding:0;
      width:100%;
      background:#000;
      color:#fff;
      font-family:sans-serif;
      overscroll-behavior:none;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
      user-select:none;
      touch-action:none;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    header {
      width:100%;
      background:#4CAF50;
      color:#fff;
      text-align:center;
      padding:10px;
      position:relative;
      box-sizing:border-box;
    }
    .back-button {
      position:absolute;
      left:10px;
      top:10px;
      text-decoration:none;
      background:#333;
      color:#fff;
      padding:6px 12px;
      border-radius:4px;
      font-size:14px;
    }
    .back-button:hover {
      background:#555;
    }
    h1 {
      margin:0;
      font-size:20px;
    }
    .instructions {
      margin:10px;
      font-size:14px;
      background:#333;
      padding:6px 10px;
      border-radius:4px;
      line-height:1.4;
      max-width:500px;
      text-align:center;
    }
    #score {
      margin:10px;
      font-size:20px;
    }
    #pongContainer {
      position:relative;
      display:flex;
      justify-content:center;
      align-items:center;
      width:100%;
      max-width:624px;
      padding:0 12px 20px;
      box-sizing:border-box;
    }
    canvas {
      width:100%;
      max-width:600px;
      height:auto;
      border:2px solid #ccc;
      background:#111;
      display:block;
    }
    #gameOver {
      position:absolute;
      top:40%;
      left:50%;
      transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.7);
      color:#fff;
      padding:20px;
      border-radius:8px;
      text-align:center;
      display:none;
      z-index:2;
    }
    #gameOver button {
      margin-top:10px;
      padding:8px 16px;
      background:#f66;
      border:none;
      cursor:pointer;
      color:#fff;
      border-radius:5px;
      font-size:16px;
    }
    #gameOver button:hover {
      background:#d55;
    }
  </style>
</head>
<body>

<header>
  <a class="back-button" href="/">Назад</a>
  <h1>Pong</h1>
</header>

<div class="instructions">
  Тяни пальцем или мышью по <b>левой половине поля</b>, чтобы двигать ракетку.<br>
  Правой ракеткой управляет ИИ. Игра заканчивается при 5 очках.
</div>

<div id="score">0 : 0</div>

<div id="pongContainer">
  <canvas id="pongCanvas" width="600" height="400"></canvas>
  <div id="gameOver">
    <h2 id="finalScore">Счёт:</h2>
    <button onclick="restartGame()">Играть снова</button>
  </div>
</div>

<script>
  document.addEventListener("touchmove", e => e.preventDefault(), { passive:false });
  document.addEventListener("selectstart", e => e.preventDefault());

  const canvas = document.getElementById("pongCanvas");
  const ctx = canvas.getContext("2d");

  let paddleHeight = 70;
  let paddleWidth = 10;

  let leftPaddleY, rightPaddleY;
  let ballX, ballY;
  let ballSize = 8;
  let ballSpeedX, ballSpeedY;

  let leftScore = 0;
  let rightScore = 0;
  let isGameOver = false;
  const maxScore = 5;
  let animationFrameId;
  let isPointerDown = false;

  function initGame() {
    leftPaddleY = canvas.height / 2 - paddleHeight / 2;
    rightPaddleY = canvas.height / 2 - paddleHeight / 2;
    leftScore = 0;
    rightScore = 0;
    isGameOver = false;
    resetBall();
  }

  function resetBall() {
    ballX = canvas.width / 2;
    ballY = canvas.height / 2;
    ballSpeedX = 2 * (Math.random() > 0.5 ? 1 : -1);
    ballSpeedY = 2 * (Math.random() > 0.5 ? 1 : -1);
  }

  function update() {
    if (isGameOver) return;

    ballX += ballSpeedX;
    ballY += ballSpeedY;

    if (ballY - ballSize < 0 || ballY + ballSize > canvas.height) {
      ballSpeedY = -ballSpeedY;
    }

    if (ballX - ballSize < paddleWidth) {
      if (ballY > leftPaddleY && ballY < leftPaddleY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
        ballSpeedX *= 1.05;
        ballSpeedY *= 1.05;
      } else {
        rightScore++;
        checkScore();
        resetBall();
      }
    }

    const center = rightPaddleY + paddleHeight / 2;
    if (center < ballY) {
      rightPaddleY += 3;
    } else {
      rightPaddleY -= 3;
    }

    if (rightPaddleY < 0) rightPaddleY = 0;
    if (rightPaddleY > canvas.height - paddleHeight) rightPaddleY = canvas.height - paddleHeight;

    if (ballX + ballSize > canvas.width - paddleWidth) {
      if (ballY > rightPaddleY && ballY < rightPaddleY + paddleHeight) {
        ballSpeedX = -ballSpeedX;
        ballSpeedX *= 1.05;
        ballSpeedY *= 1.05;
      } else {
        leftScore++;
        checkScore();
        resetBall();
      }
    }

    draw();
    animationFrameId = requestAnimationFrame(update);
  }

  function checkScore() {
    if (leftScore >= maxScore || rightScore >= maxScore) {
      isGameOver = true;
      document.getElementById("finalScore").textContent = `Счёт: ${leftScore} : ${rightScore}`;
      document.getElementById("gameOver").style.display = "block";
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#fff";
    ctx.fillRect(0, leftPaddleY, paddleWidth, paddleHeight);
    ctx.fillRect(canvas.width - paddleWidth, rightPaddleY, paddleWidth, paddleHeight);

    ctx.beginPath();
    ctx.arc(ballX, ballY, ballSize, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(canvas.width / 2, 0);
    ctx.lineTo(canvas.width / 2, canvas.height);
    ctx.stroke();

    document.getElementById("score").textContent = `${leftScore} : ${rightScore}`;
  }

  function restartGame() {
    document.getElementById("gameOver").style.display = "none";
    initGame();
    cancelAnimationFrame(animationFrameId);
    requestAnimationFrame(update);
  }

  function getCanvasPointerPosition(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    return {
      x: (e.clientX - rect.left) * scaleX,
      y: (e.clientY - rect.top) * scaleY
    };
  }

  function moveLeftPaddle(pointerY) {
    let newY = pointerY - paddleHeight / 2;
    if (newY < 0) newY = 0;
    if (newY > canvas.height - paddleHeight) newY = canvas.height - paddleHeight;
    leftPaddleY = newY;
  }

  canvas.addEventListener("pointerdown", e => {
    const pos = getCanvasPointerPosition(e);
    if (pos.x <= canvas.width / 2) {
      isPointerDown = true;
      canvas.setPointerCapture?.(e.pointerId);
      moveLeftPaddle(pos.y);
    }
  });

  canvas.addEventListener("pointermove", e => {
    if (!isPointerDown) return;
    const pos = getCanvasPointerPosition(e);
    moveLeftPaddle(pos.y);
  });

  canvas.addEventListener("pointerup", e => {
    isPointerDown = false;
    canvas.releasePointerCapture?.(e.pointerId);
  });

  canvas.addEventListener("pointercancel", e => {
    isPointerDown = false;
    canvas.releasePointerCapture?.(e.pointerId);
  });

  canvas.addEventListener("pointerleave", () => {
    isPointerDown = false;
  });

  restartGame();
</script>

<script>
  (function setupFullscreenBackFix() {
    const backButton = document.querySelector('.back-button');
    const tg = window.Telegram && window.Telegram.WebApp;
    if (!backButton || !tg) return;

    function handleBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }

    function apply() {
      const safe = tg.contentSafeAreaInset || tg.safeAreaInset || {};
      const isFullscreen = tg.isFullscreen === true || (Number(safe.top) || 0) >= 24;
      backButton.style.display = isFullscreen ? 'none' : 'inline-flex';

      if (!tg.BackButton) return;
      if (typeof tg.BackButton.offClick === 'function') tg.BackButton.offClick(handleBack);
      if (isFullscreen) {
        if (typeof tg.BackButton.onClick === 'function') tg.BackButton.onClick(handleBack);
        if (typeof tg.BackButton.show === 'function') tg.BackButton.show();
      } else if (typeof tg.BackButton.hide === 'function') {
        tg.BackButton.hide();
      }
    }

    tg.ready();
    apply();
    setTimeout(apply, 150);
    setTimeout(apply, 500);

    if (tg.onEvent) {
      tg.onEvent('viewportChanged', apply);
      tg.onEvent('safeAreaChanged', apply);
      tg.onEvent('contentSafeAreaChanged', apply);
      tg.onEvent('fullscreenChanged', apply);
    }

    window.addEventListener('resize', apply, { passive: true });
    window.addEventListener('orientationchange', apply, { passive: true });
  })();
</script>
</body>
</html>
