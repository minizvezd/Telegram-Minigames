<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сапёр 8x8</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

  <style>
    :root {
      --game-bg: #000;
      --panel-bg: #111;
      --panel-muted: #333;
      --panel-border: #ccc;
      --accent: #4CAF50;
      --text: #fff;
      --button-bg: #333;
      --button-hover: #555;
      --danger: #f66;
      --danger-hover: #d55;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--game-bg);
      color: var(--text);
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      touch-action: none;
    }

    body {
      box-sizing: border-box;
      min-height: 100dvh;
      width: 100%;
      padding-top: calc(max(env(safe-area-inset-top, 0px), var(--tg-safe-top, 0px)) + var(--tg-overlay-top, 0px)) !important;
      padding-right: max(env(safe-area-inset-right, 0px), var(--tg-safe-right, 0px)) !important;
      padding-bottom: max(env(safe-area-inset-bottom, 0px), var(--tg-safe-bottom, 0px)) !important;
      padding-left: max(env(safe-area-inset-left, 0px), var(--tg-safe-left, 0px)) !important;
    }

    * {
      box-sizing: border-box;
    }

    header {
      width: 100%;
      min-height: 56px;
      background: var(--accent);
      color: var(--text);
      text-align: center;
      padding: 10px 56px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-button {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      text-decoration: none;
      background: var(--button-bg);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
    }

    .back-button:hover {
      background: var(--button-hover);
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .instructions {
      margin: 10px 12px;
      font-size: 14px;
      background: var(--panel-muted);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      line-height: 1.4;
      width: min(100% - 24px, 500px);
      max-width: 500px;
      text-align: center;
    }

    #info {
      display: flex;
      gap: 20px;
      margin: 8px 12px 10px;
      font-size: 17px;
      font-weight: 700;
      justify-content: center;
      flex-wrap: wrap;
    }

    #mineContainer {
      position: relative;
      display: flex;
      justify-content: center;
      width: 100%;
      padding: 0 12px 20px;
    }

    #boardWrap {
      position: relative;
      padding: 10px;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 8px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(8, 40px);
      gap: 3px;
    }

    .cell {
      width: 40px;
      height: 40px;
      background: #2b2b2b;
      color: #fff;
      font-weight: bold;
      font-size: 18px;
      border: 1px solid #555;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      border-radius: 3px;
    }

    .cell.open {
      background: #e6e6e6;
      color: #000;
      cursor: default;
      border-color: #cfcfcf;
    }

    .cell.flag {
      background: #2b2b2b url("data:image/svg+xml,%3Csvg fill='%23ff4d4f' viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M80 32v448h32V288h272c17.7 0 32-14.3 32-32v-49c0-10.6-5.2-20.6-14-26.7L276.5 112l125.5-68.3c8.7-5 14-14.1 14-24.1V-30c0-17.7-14.3-32-32-32H112c-17.7 0-32 14.3-32 32v64z'/%3E%3C/svg%3E") center center no-repeat;
      background-size: 24px;
    }

    .cell.mine {
      background: #f66;
      color: #fff;
      border-color: #f66;
    }

    #gameOver {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.82);
      color: var(--text);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      display: none;
      min-width: 240px;
    }

    #gameOver button {
      margin-top: 10px;
      padding: 10px 16px;
      background: var(--danger);
      border: none;
      cursor: pointer;
      color: var(--text);
      border-radius: 5px;
      font-size: 16px;
    }

    #gameOver button:hover {
      background: var(--danger-hover);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 18px;
      }

      #info {
        font-size: 16px;
        gap: 14px;
      }

      #board {
        grid-template-columns: repeat(8, 35px);
      }

      .cell {
        width: 35px;
        height: 35px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <a class="back-button" href="/">Назад</a>
    <h1>Сапёр 8x8</h1>
  </header>

  <div class="instructions">
    Первая открытая ячейка никогда не будет миной.<br>
    ПК: ЛКМ - открыть, ПКМ - поставить флажок.<br>
    Телефон: короткий тап - открыть, долгий тап (~0.4с) - флажок.
  </div>

  <div id="info">
    <div>Осталось мин: <span id="minesCount">10</span></div>
    <div>Время: <span id="timeValue">0</span> c</div>
  </div>

  <div id="mineContainer">
    <div id="boardWrap">
      <div id="board"></div>
      <div id="gameOver">
        <h2 id="resultMsg"></h2>
        <button onclick="restartGame()">Играть снова</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });
    document.addEventListener("selectstart", e => e.preventDefault());

    const boardElem = document.getElementById("board");
    const minesCountElem = document.getElementById("minesCount");
    const timeValue = document.getElementById("timeValue");
    const gameOverDiv = document.getElementById("gameOver");
    const resultMsg = document.getElementById("resultMsg");

    const size = 8;
    const mineTotal = 10;
    let board = [];
    let cellsLeft = size * size;
    let flagsUsed = 0;
    let startTime = 0;
    let timerInterval = null;
    let isGameOver = false;
    let isFirstClick = true;

    let touchTimeout = null;
    let touchedCell = null;

    function initBoard() {
      board = [];
      for (let r = 0; r < size; r++) {
        let row = [];
        for (let c = 0; c < size; c++) {
          row.push({
            mine: false,
            open: false,
            flag: false,
            adjacent: 0
          });
        }
        board.push(row);
      }

      cellsLeft = size * size;
      flagsUsed = 0;
      isGameOver = false;
      isFirstClick = true;
      updateMinesCount();
    }

    function drawBoard() {
      boardElem.innerHTML = "";
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const cellDiv = document.createElement("div");
          cellDiv.classList.add("cell");
          cellDiv.dataset.r = r;
          cellDiv.dataset.c = c;

          const data = board[r][c];
          if (data.open) {
            cellDiv.classList.add("open");
            if (data.mine) {
              cellDiv.classList.add("mine");
              cellDiv.textContent = "X";
            } else if (data.adjacent > 0) {
              cellDiv.textContent = data.adjacent;
            }
          } else if (data.flag) {
            cellDiv.classList.add("flag");
          }

          boardElem.appendChild(cellDiv);

          cellDiv.addEventListener("touchstart", e => onTouchStart(e, cellDiv));
          cellDiv.addEventListener("touchend", e => onTouchEnd(e, cellDiv));
          cellDiv.addEventListener("click", onCellClick);
        }
      }
    }

    boardElem.addEventListener("contextmenu", e => {
      e.preventDefault();
      if (isGameOver) return;
      const target = e.target;
      if (!target.classList.contains("cell")) return;
      let r = +target.dataset.r;
      let c = +target.dataset.c;
      toggleFlag(r, c);
      drawBoard();
    });

    function onTouchStart(e, cellDiv) {
      if (isGameOver) return;
      touchedCell = cellDiv;
      touchTimeout = setTimeout(() => {
        if (touchedCell) {
          let r = +touchedCell.dataset.r;
          let c = +touchedCell.dataset.c;
          toggleFlag(r, c);
          drawBoard();
          touchedCell = null;
        }
      }, 400);
    }

    function onTouchEnd(e, cellDiv) {
      if (isGameOver) return;
      if (touchTimeout) clearTimeout(touchTimeout);
      if (touchedCell) {
        let r = +cellDiv.dataset.r;
        let c = +cellDiv.dataset.c;
        openCell(r, c);
        drawBoard();
      }
      touchedCell = null;
    }

    function onCellClick(e) {
      if (isGameOver) return;
      const r = +e.target.dataset.r;
      const c = +e.target.dataset.c;
      openCell(r, c);
      drawBoard();
    }

    function openCell(r, c) {
      const cell = board[r][c];
      if (cell.open || cell.flag) return;

      if (isFirstClick) {
        placeMinesExcept(r, c);
        computeAdjacents();
        isFirstClick = false;
      }

      cell.open = true;
      cellsLeft--;

      if (cell.mine) {
        showAllMines();
        endGame(false);
        return;
      }

      if (cell.adjacent === 0) {
        floodOpen(r, c);
      }

      if (cellsLeft === mineTotal) {
        endGame(true);
      }
    }

    function toggleFlag(r, c) {
      const cell = board[r][c];
      if (cell.open) return;
      cell.flag = !cell.flag;
      flagsUsed += (cell.flag ? 1 : -1);
      updateMinesCount();
    }

    function updateMinesCount() {
      const left = mineTotal - flagsUsed;
      minesCountElem.textContent = (left >= 0) ? left : 0;
    }

    function floodOpen(r, c) {
      for (let rr = -1; rr <= 1; rr++) {
        for (let cc = -1; cc <= 1; cc++) {
          const nr = r + rr;
          const nc = c + cc;
          if (nr >= 0 && nr < size && nc >= 0 && nc < size) {
            let neighbor = board[nr][nc];
            if (!neighbor.open && !neighbor.mine) {
              openCell(nr, nc);
            }
          }
        }
      }
    }

    function showAllMines() {
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (board[r][c].mine) {
            board[r][c].open = true;
          }
        }
      }
    }

    function endGame(win) {
      isGameOver = true;
      clearInterval(timerInterval);
      if (win) {
        resultMsg.textContent = `Поздравляем, вы победили! Время: ${timeValue.textContent} сек.`;
      } else {
        resultMsg.textContent = `Мина! Вы проиграли. Время: ${timeValue.textContent} сек.`;
      }
      gameOverDiv.style.display = "block";
    }

    function placeMinesExcept(exceptR, exceptC) {
      let placed = 0;
      while (placed < mineTotal) {
        let rr = Math.floor(Math.random() * size);
        let cc = Math.floor(Math.random() * size);
        if (rr === exceptR && cc === exceptC) continue;
        if (board[rr][cc].mine) continue;
        board[rr][cc].mine = true;
        placed++;
      }
    }

    function computeAdjacents() {
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (!board[r][c].mine) {
            board[r][c].adjacent = countMines(r, c);
          }
        }
      }
    }

    function countMines(r, c) {
      let count = 0;
      for (let rr = -1; rr <= 1; rr++) {
        for (let cc = -1; cc <= 1; cc++) {
          let nr = r + rr;
          let nc = c + cc;
          if (nr >= 0 && nr < size && nc >= 0 && nc < size && board[nr][nc].mine) {
            count++;
          }
        }
      }
      return count;
    }

    function restartGame() {
      gameOverDiv.style.display = "none";
      initBoard();
      drawBoard();
      startTime = Date.now();
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeValue.textContent = Math.floor((Date.now() - startTime) / 1000);
      }, 1000);
    }

    function start() {
      restartGame();
    }

    start();
  </script>

  <script>
    (function setupFullscreenBackFix() {
      const backButton = document.querySelector('.back-button');
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!backButton || !tg) return;

      function handleBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/';
        }
      }

      function apply() {
        const safe = tg.contentSafeAreaInset || tg.safeAreaInset || {};
        const isFullscreen = tg.isFullscreen === true || (Number(safe.top) || 0) >= 24;
        backButton.style.display = isFullscreen ? 'none' : 'inline-flex';

        if (!tg.BackButton) return;
        if (typeof tg.BackButton.offClick === 'function') tg.BackButton.offClick(handleBack);
        if (isFullscreen) {
          if (typeof tg.BackButton.onClick === 'function') tg.BackButton.onClick(handleBack);
          if (typeof tg.BackButton.show === 'function') tg.BackButton.show();
        } else if (typeof tg.BackButton.hide === 'function') {
          tg.BackButton.hide();
        }
      }

      tg.ready();
      apply();
      setTimeout(apply, 150);
      setTimeout(apply, 500);

      if (tg.onEvent) {
        tg.onEvent('viewportChanged', apply);
        tg.onEvent('safeAreaChanged', apply);
        tg.onEvent('contentSafeAreaChanged', apply);
        tg.onEvent('fullscreenChanged', apply);
      }

      window.addEventListener('resize', apply, { passive: true });
      window.addEventListener('orientationchange', apply, { passive: true });
    })();
  </script>
</body>
</html>
