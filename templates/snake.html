<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Змейка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body {
      margin:0;
      padding-top: calc(max(env(safe-area-inset-top, 0px), var(--tg-safe-top, 0px)) + var(--tg-overlay-top, 0px)) !important;
      padding-right: max(env(safe-area-inset-right, 0px), var(--tg-safe-right, 0px)) !important;
      padding-bottom: max(env(safe-area-inset-bottom, 0px), var(--tg-safe-bottom, 0px)) !important;
      padding-left: max(env(safe-area-inset-left, 0px), var(--tg-safe-left, 0px)) !important;
      box-sizing:border-box;
      min-height:100dvh;
      width:100%;
      background:#222;
      color:#fff;
      font-family:sans-serif;
      overscroll-behavior:none;
      -webkit-overflow-scrolling:none;
      -webkit-touch-callout:none;
      -webkit-user-select:none;
      -moz-user-select:none;
      -ms-user-select:none;
      user-select:none;
      touch-action:none;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    header {
      width:100%;
      background:#4CAF50;
      color:#fff;
      text-align:center;
      padding:10px;
      position:relative;
      box-sizing:border-box;
    }
    .back-button {
      position:absolute;
      left:10px;
      top:10px;
      text-decoration:none;
      background:#333;
      color:#fff;
      padding:6px 12px;
      border-radius:4px;
      font-size:14px;
    }
    .back-button:hover{
      background:#555;
    }
    h1{
      margin:0;
      font-size:20px;
    }
    .instructions{
      margin:10px;
      font-size:14px;
      background:#333;
      padding:6px 10px;
      border-radius:4px;
      line-height:1.4;
      max-width:500px;
      text-align:center;
    }
    #score{
      margin:8px 0;
      font-size:20px;
    }
    #gameContainer{
      position:relative;
      margin:10px auto 20px;
      display:flex;
      justify-content:center;
      width:100%;
      max-width:440px;
    }
    canvas {
      background:#111;
      border:2px solid #555;
      display:block;
      max-width:100%;
      height:auto;
    }
    #gameOver {
      display:none;
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      background:rgba(0, 0, 0, 0.85);
      padding:20px;
      border-radius:10px;
      text-align:center;
      z-index:2;
    }
    #gameOver button {
      background:#f66;
      border:none;
      color:#fff;
      padding:10px 20px;
      font-size:16px;
      cursor:pointer;
      border-radius:5px;
    }
    #gameOver button:hover {
      background:#d55;
    }
    @media(max-width:600px){
      canvas {
        width:300px;
        height:300px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="back-button" href="/">Назад</a>
    <h1>Змейка</h1>
  </header>

  <div class="instructions">
    Управление: стрелки или W/A/S/D. На телефоне — свайпы.<br>
    Цель: съесть как можно больше яблок. Столкновение со стеной или хвостом — проигрыш.
  </div>

  <div id="score">Очки: <span id="scoreValue">0</span></div>

  <div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="gameOver">
      <h2>Игра окончена!</h2>
      <p>Счёт: <span id="finalScore">0</span></p>
      <button onclick="restartGame()">Играть снова</button>
    </div>
  </div>

  <script>
    document.addEventListener("touchmove", function(e){ e.preventDefault(); }, { passive:false });
    document.addEventListener("selectstart", function(e){ e.preventDefault(); });

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const gridSize = 20;
    const canvasSize = canvas.width;
    const gridCount = canvasSize / gridSize;
    const tickMs = 180;

    let snake = [];
    let direction = { x: 1, y: 0 };
    let nextDirection = { x: 1, y: 0 };
    let food = { x: 5, y: 5 };
    let score = 0;
    let gameInterval = null;
    let isGameOver = false;

    function drawCell(x, y, color, radius) {
      const px = x * gridSize;
      const py = y * gridSize;
      const size = gridSize - 1;

      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(px + radius, py);
      ctx.lineTo(px + size - radius, py);
      ctx.quadraticCurveTo(px + size, py, px + size, py + radius);
      ctx.lineTo(px + size, py + size - radius);
      ctx.quadraticCurveTo(px + size, py + size, px + size - radius, py + size);
      ctx.lineTo(px + radius, py + size);
      ctx.quadraticCurveTo(px, py + size, px, py + size - radius);
      ctx.lineTo(px, py + radius);
      ctx.quadraticCurveTo(px, py, px + radius, py);
      ctx.closePath();
      ctx.fill();
    }

    function drawSnake() {
      snake.forEach(function(segment, index) {
        drawCell(segment.x, segment.y, index === 0 ? "#65ff98" : "#22c55e", index === 0 ? 7 : 5);
      });
    }

    function drawFood() {
      ctx.fillStyle = "#ff5d73";
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function render() {
      ctx.clearRect(0, 0, canvasSize, canvasSize);
      drawSnake();
      drawFood();
    }

    function update() {
      if (isGameOver) return;

      direction = nextDirection;
      const nextHead = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (nextHead.x < 0 || nextHead.x >= gridCount || nextHead.y < 0 || nextHead.y >= gridCount) {
        gameOver();
        return;
      }

      const willEat = nextHead.x === food.x && nextHead.y === food.y;
      const collisionBody = willEat ? snake : snake.slice(0, -1);

      for (let i = 0; i < collisionBody.length; i++) {
        const segment = collisionBody[i];
        if (segment.x === nextHead.x && segment.y === nextHead.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(nextHead);

      if (willEat) {
        score++;
        document.getElementById("scoreValue").textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      render();
    }

    function placeFood() {
      let occupied;
      do {
        food.x = Math.floor(Math.random() * gridCount);
        food.y = Math.floor(Math.random() * gridCount);
        occupied = false;
        for (let i = 0; i < snake.length; i++) {
          if (snake[i].x === food.x && snake[i].y === food.y) {
            occupied = true;
            break;
          }
        }
      } while (occupied);
    }

    function gameOver() {
      isGameOver = true;
      clearInterval(gameInterval);
      document.getElementById("finalScore").textContent = score;
      document.getElementById("gameOver").style.display = "block";
    }

    function setDirection(newDirection) {
      if (isGameOver) return;

      const oppositeX = direction.x + newDirection.x === 0;
      const oppositeY = direction.y + newDirection.y === 0;

      if (oppositeX && oppositeY) {
        return;
      }

      nextDirection = newDirection;
    }

    function restartGame() {
      snake = [{ x: 8, y: 8 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      isGameOver = false;

      document.getElementById("scoreValue").textContent = score;
      document.getElementById("gameOver").style.display = "none";

      placeFood();
      clearInterval(gameInterval);
      render();
      gameInterval = setInterval(update, tickMs);
    }

    document.addEventListener("keydown", function(e) {
      switch (e.key) {
        case "ArrowUp":
        case "w":
        case "W":
          setDirection({ x: 0, y: -1 });
          break;
        case "ArrowDown":
        case "s":
        case "S":
          setDirection({ x: 0, y: 1 });
          break;
        case "ArrowLeft":
        case "a":
        case "A":
          setDirection({ x: -1, y: 0 });
          break;
        case "ArrowRight":
        case "d":
        case "D":
          setDirection({ x: 1, y: 0 });
          break;
      }
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", function(e) {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    canvas.addEventListener("touchend", function(e) {
      if (isGameOver) return;

      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;

      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) {
        return;
      }

      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 });
      } else {
        setDirection(dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 });
      }
    }, { passive: true });

    restartGame();
  </script>
</body>
</html>
