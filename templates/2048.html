<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>2048</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    :root {
      --game-bg: #000;
      --panel-bg: #111;
      --panel-muted: #333;
      --panel-border: #ccc;
      --accent: #4CAF50;
      --text: #fff;
      --button-bg: #333;
      --button-hover: #555;
      --danger: #f66;
      --danger-hover: #d55;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--game-bg);
      color: var(--text);
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      touch-action: none;
    }

    body {
      box-sizing: border-box;
      min-height: 100dvh;
      width: 100%;
      padding-top: calc(max(env(safe-area-inset-top, 0px), var(--tg-safe-top, 0px)) + var(--tg-overlay-top, 0px)) !important;
      padding-right: max(env(safe-area-inset-right, 0px), var(--tg-safe-right, 0px)) !important;
      padding-bottom: max(env(safe-area-inset-bottom, 0px), var(--tg-safe-bottom, 0px)) !important;
      padding-left: max(env(safe-area-inset-left, 0px), var(--tg-safe-left, 0px)) !important;
    }

    * {
      box-sizing: border-box;
    }

    header {
      width: 100%;
      background: var(--accent);
      color: var(--text);
      text-align: center;
      padding: 10px 12px;
      position: relative;
    }

    .back-button {
      position: absolute;
      left: 10px;
      top: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      text-decoration: none;
      background: var(--button-bg);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
    }

    .back-button:hover {
      background: var(--button-hover);
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .instructions {
      margin: 10px 12px;
      font-size: 14px;
      background: var(--panel-muted);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      line-height: 1.4;
      width: min(100% - 24px, 500px);
      max-width: 500px;
      text-align: center;
    }

    #score {
      margin: 8px 12px 10px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    #boardContainer {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0 12px 20px;
    }

    #boardWrap {
      position: relative;
      padding: 10px;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 8px;
    }

    #board {
      position: relative;
      width: 340px;
      height: 340px;
      background: #bbada0;
      border-radius: 10px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      outline: none;
    }

    .cell {
      width: 70px;
      height: 70px;
      background: #cdc1b4;
      border-radius: 5px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 24px;
      color: #776e65;
      transition: transform 0.2s, background 0.2s;
    }

    .cell[data-value="2"]    { background:#eee4da; }
    .cell[data-value="4"]    { background:#ede0c8; }
    .cell[data-value="8"]    { background:#f2b179; color:#f9f6f2; }
    .cell[data-value="16"]   { background:#f59563; color:#f9f6f2; }
    .cell[data-value="32"]   { background:#f67c5f; color:#f9f6f2; }
    .cell[data-value="64"]   { background:#f65e3b; color:#f9f6f2; }
    .cell[data-value="128"]  { background:#edcf72; color:#f9f6f2; }
    .cell[data-value="256"]  { background:#edcc61; color:#f9f6f2; }
    .cell[data-value="512"]  { background:#edc850; color:#f9f6f2; }
    .cell[data-value="1024"] { background:#edc53f; color:#f9f6f2; }
    .cell[data-value="2048"] { background:#edc22e; color:#f9f6f2; }

    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.82);
      color: var(--text);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      display: none;
      min-width: 220px;
    }

    #gameOver button {
      margin-top: 10px;
      padding: 10px 16px;
      background: var(--danger);
      border: none;
      cursor: pointer;
      color: var(--text);
      border-radius: 5px;
      font-size: 16px;
    }

    #gameOver button:hover {
      background: var(--danger-hover);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 18px;
      }

      #score {
        font-size: 17px;
      }

      #board {
        width: 300px;
        height: 300px;
      }

      .cell {
        width: 60px;
        height: 60px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="back-button" href="/">Назад</a>
    <h1>2048</h1>
  </header>

  <div class="instructions">
    Управление: стрелки / WASD, на телефоне — свайпы.<br>
    Объединяйте плитки с одинаковыми числами.
  </div>

  <div id="score">Очки: <span id="scoreVal">0</span></div>

  <div id="boardContainer">
    <div id="boardWrap">
      <div id="board" tabindex="0"></div>
      <div id="gameOver">
        <h2 id="finalMsg"></h2>
        <button onclick="restartGame()">Играть снова</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("touchmove", e => e.preventDefault(), {passive:false});
    document.addEventListener("selectstart", e => e.preventDefault());

    const size = 4;
    let board = [];
    let score = 0;

    const boardElem = document.getElementById("board");
    const scoreVal = document.getElementById("scoreVal");
    const gameOverDiv = document.getElementById("gameOver");
    const finalMsg = document.getElementById("finalMsg");

    let touchStartX = 0, touchStartY = 0;
    const SWIPE_THRESHOLD = 30;

    function init() {
      board = [];
      for (let r = 0; r < size; r++) {
        board.push(new Array(size).fill(0));
      }
      score = 0;
      updateScore();
      addNewTile();
      addNewTile();
      drawBoard();
      gameOverDiv.style.display = "none";
      focusGame();
    }

    function focusGame() {
      boardElem.focus({preventScroll:true});
      window.focus();
    }

    function drawBoard() {
      boardElem.innerHTML = "";
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          const val = board[r][c];
          const cell = document.createElement("div");
          cell.classList.add("cell");
          if (val > 0) {
            cell.textContent = val;
            cell.dataset.value = val;
          } else {
            cell.textContent = "";
            cell.dataset.value = 0;
          }
          boardElem.appendChild(cell);
        }
      }
    }

    function addNewTile() {
      let empty = [];
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (board[r][c] === 0) {
            empty.push({r, c});
          }
        }
      }
      if (empty.length === 0) return;
      let spot = empty[Math.floor(Math.random() * empty.length)];
      board[spot.r][spot.c] = (Math.random() < 0.9) ? 2 : 4;
    }

    function updateScore() {
      scoreVal.textContent = score;
    }

    function handleMove(direction) {
      let moved = false;

      switch(direction) {
        case "left":
          moved = moveLeft();
          break;
        case "right":
          moved = moveRight();
          break;
        case "up":
          moved = moveUp();
          break;
        case "down":
          moved = moveDown();
          break;
      }

      if (moved) afterMove();
      return moved;
    }

    function handleKeyDown(e) {
      let direction = null;

      switch(e.code) {
        case "ArrowLeft":
        case "KeyA":
          direction = "left";
          break;
        case "ArrowRight":
        case "KeyD":
          direction = "right";
          break;
        case "ArrowUp":
        case "KeyW":
          direction = "up";
          break;
        case "ArrowDown":
        case "KeyS":
          direction = "down";
          break;
      }

      if (!direction) {
        switch(e.key) {
          case "ArrowLeft":
          case "a":
          case "A":
            direction = "left";
            break;
          case "ArrowRight":
          case "d":
          case "D":
            direction = "right";
            break;
          case "ArrowUp":
          case "w":
          case "W":
            direction = "up";
            break;
          case "ArrowDown":
          case "s":
          case "S":
            direction = "down";
            break;
        }
      }

      if (!direction) return;

      e.preventDefault();
      handleMove(direction);
    }

    window.addEventListener("keydown", handleKeyDown, {passive:false});
    document.addEventListener("keydown", handleKeyDown, {passive:false});

    function afterMove() {
      addNewTile();
      drawBoard();
      updateScore();
      checkGameOver();
      focusGame();
    }

    function moveLeft() {
      let moved = false;
      for (let r = 0; r < size; r++) {
        let newRow = compressRow(board[r]);
        newRow = mergeRow(newRow);
        newRow = compressRow(newRow);
        if (JSON.stringify(newRow) !== JSON.stringify(board[r])) {
          moved = true;
        }
        board[r] = newRow;
      }
      return moved;
    }

    function moveRight() {
      let moved = false;
      for (let r = 0; r < size; r++) {
        let rev = board[r].slice().reverse();
        rev = compressRow(rev);
        rev = mergeRow(rev);
        rev = compressRow(rev);
        rev.reverse();
        if (JSON.stringify(rev) !== JSON.stringify(board[r])) {
          moved = true;
        }
        board[r] = rev;
      }
      return moved;
    }

    function moveUp() {
      let moved = false;
      for (let c = 0; c < size; c++) {
        let col = [];
        for (let r = 0; r < size; r++) {
          col.push(board[r][c]);
        }
        let newCol = compressRow(col);
        newCol = mergeRow(newCol);
        newCol = compressRow(newCol);
        for (let r = 0; r < size; r++) {
          if (board[r][c] !== newCol[r]) moved = true;
          board[r][c] = newCol[r];
        }
      }
      return moved;
    }

    function moveDown() {
      let moved = false;
      for (let c = 0; c < size; c++) {
        let col = [];
        for (let r = 0; r < size; r++) {
          col.push(board[r][c]);
        }
        let rev = col.reverse();
        rev = compressRow(rev);
        rev = mergeRow(rev);
        rev = compressRow(rev);
        rev.reverse();
        for (let r = 0; r < size; r++) {
          if (board[r][c] !== rev[r]) moved = true;
          board[r][c] = rev[r];
        }
      }
      return moved;
    }

    function compressRow(row) {
      let arr = row.filter(v => v !== 0);
      while (arr.length < size) {
        arr.push(0);
      }
      return arr;
    }

    function mergeRow(row) {
      for (let i = 0; i < size - 1; i++) {
        if (row[i] !== 0 && row[i] === row[i + 1]) {
          row[i] *= 2;
          score += row[i];
          row[i + 1] = 0;
        }
      }
      return row;
    }

    boardElem.addEventListener("touchstart", e => {
      focusGame();
      let t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    });

    boardElem.addEventListener("touchend", e => {
      let t = e.changedTouches[0];
      let dx = t.clientX - touchStartX;
      let dy = t.clientY - touchStartY;
      let moved = false;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > SWIPE_THRESHOLD) {
          moved = handleMove("right");
        } else if (dx < -SWIPE_THRESHOLD) {
          moved = handleMove("left");
        }
      } else {
        if (dy > SWIPE_THRESHOLD) {
          moved = handleMove("down");
        } else if (dy < -SWIPE_THRESHOLD) {
          moved = handleMove("up");
        }
      }

      if (moved) focusGame();
    });

    boardElem.addEventListener("pointerdown", focusGame);
    window.addEventListener("click", focusGame);

    function checkGameOver() {
      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          if (board[r][c] === 0) return;
          if (c < size - 1 && board[r][c] === board[r][c + 1]) return;
          if (r < size - 1 && board[r][c] === board[r + 1][c]) return;
        }
      }
      gameOverDiv.style.display = "block";
      finalMsg.textContent = `Игра окончена! Ваш счёт: ${score}`;
    }

    function restartGame() {
      init();
    }

    init();
  </script>

  <script>
    (function setupFullscreenBackFix() {
      const backButton = document.querySelector('.back-button');
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!backButton || !tg) return;

      function handleBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/';
        }
      }

      function apply() {
        const safe = tg.contentSafeAreaInset || tg.safeAreaInset || {};
        const isFullscreen = tg.isFullscreen === true || (Number(safe.top) || 0) >= 24;
        backButton.style.display = isFullscreen ? 'none' : 'inline-flex';

        if (!tg.BackButton) return;
        if (typeof tg.BackButton.offClick === 'function') tg.BackButton.offClick(handleBack);
        if (isFullscreen) {
          if (typeof tg.BackButton.onClick === 'function') tg.BackButton.onClick(handleBack);
          if (typeof tg.BackButton.show === 'function') tg.BackButton.show();
        } else if (typeof tg.BackButton.hide === 'function') {
          tg.BackButton.hide();
        }
      }

      tg.ready();
      apply();
      setTimeout(apply, 150);
      setTimeout(apply, 500);

      if (tg.onEvent) {
        tg.onEvent('viewportChanged', apply);
        tg.onEvent('safeAreaChanged', apply);
        tg.onEvent('contentSafeAreaChanged', apply);
        tg.onEvent('fullscreenChanged', apply);
      }

      window.addEventListener('resize', apply, { passive: true });
      window.addEventListener('orientationchange', apply, { passive: true });
    })();
  </script>
</body>
</html>
