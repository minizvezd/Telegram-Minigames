<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Змейка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    :root {
      --game-bg: #000;
      --panel-bg: #111;
      --panel-muted: #333;
      --panel-border: #ccc;
      --accent: #4CAF50;
      --text: #fff;
      --button-bg: #333;
      --button-hover: #555;
      --danger: #f66;
      --danger-hover: #d55;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--game-bg);
      color: var(--text);
      font-family: sans-serif;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      touch-action: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body {
      box-sizing: border-box;
      min-height: 100dvh;
      width: 100%;
      padding-top: calc(max(env(safe-area-inset-top, 0px), var(--tg-safe-top, 0px)) + var(--tg-overlay-top, 0px)) !important;
      padding-right: max(env(safe-area-inset-right, 0px), var(--tg-safe-right, 0px)) !important;
      padding-bottom: max(env(safe-area-inset-bottom, 0px), var(--tg-safe-bottom, 0px)) !important;
      padding-left: max(env(safe-area-inset-left, 0px), var(--tg-safe-left, 0px)) !important;
    }

    * {
      box-sizing: border-box;
    }

    header {
      width: 100%;
      min-height: 56px;
      background: var(--accent);
      color: var(--text);
      text-align: center;
      padding: 10px 56px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-button {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      text-decoration: none;
      background: var(--button-bg);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1;
    }

    .back-button:hover {
      background: var(--button-hover);
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .instructions {
      margin: 10px 12px;
      font-size: 14px;
      background: var(--panel-muted);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 4px;
      line-height: 1.4;
      width: min(100% - 24px, 500px);
      max-width: 500px;
      text-align: center;
    }

    #score {
      margin: 8px 12px 10px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    #gameContainer {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0 12px 20px;
    }

    #gameWrap {
      position: relative;
      padding: 10px;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 8px;
    }

    canvas {
      background: #111;
      border: 2px solid #555;
      display: block;
      width: 400px;
      max-width: 100%;
      height: auto;
    }

    #gameOver {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.82);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      z-index: 2;
      min-width: 220px;
    }

    #gameOver button {
      margin-top: 10px;
      background: var(--danger);
      border: none;
      color: var(--text);
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    #gameOver button:hover {
      background: var(--danger-hover);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 18px;
      }

      #score {
        font-size: 17px;
      }

      canvas {
        width: 300px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="back-button" href="/">Назад</a>
    <h1>Змейка</h1>
  </header>

  <div class="instructions">
    Управление: стрелки или W/A/S/D, на телефоне - свайпы.<br>
    Цель: съесть как можно больше яблок. Столкновение со стеной или хвостом - проигрыш.
  </div>

  <div id="score">Очки: <span id="scoreValue">0</span></div>

  <div id="gameContainer">
    <div id="gameWrap">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div id="gameOver">
        <h2>Игра окончена!</h2>
        <p>Счёт: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Играть снова</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("touchmove", e => e.preventDefault(), { passive:false });
    document.addEventListener("selectstart", e => e.preventDefault());

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const gridSize = 20;
    const canvasSize = canvas.width;
    const gridCount = canvasSize / gridSize;

    let snake = [{ x: 8, y: 8 }];
    let direction = { x: 1, y: 0 };
    let food = { x: 5, y: 5 };
    let score = 0;
    let gameInterval = null;
    let isGameOver = false;

    function drawSnake() {
      ctx.fillStyle = "#0f0";
      snake.forEach(segment => {
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
      });
    }

    function drawFood() {
      ctx.fillStyle = "#f00";
      ctx.beginPath();
      ctx.arc(
        food.x * gridSize + gridSize / 2,
        food.y * gridSize + gridSize / 2,
        gridSize / 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function update() {
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
        gameOver();
        return;
      }

      for (let segment of snake) {
        if (segment.x === head.x && segment.y === head.y) {
          gameOver();
          return;
        }
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        document.getElementById("scoreValue").textContent = score;
        placeFood();
      } else {
        snake.pop();
      }

      ctx.clearRect(0, 0, canvasSize, canvasSize);
      drawSnake();
      drawFood();
    }

    function placeFood() {
      food.x = Math.floor(Math.random() * gridCount);
      food.y = Math.floor(Math.random() * gridCount);

      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          placeFood();
          return;
        }
      }
    }

    function gameOver() {
      isGameOver = true;
      clearInterval(gameInterval);
      document.getElementById("finalScore").textContent = score;
      document.getElementById("gameOver").style.display = "block";
    }

    function restartGame() {
      snake = [{ x: 8, y: 8 }];
      direction = { x: 1, y: 0 };
      score = 0;
      document.getElementById("scoreValue").textContent = score;
      document.getElementById("gameOver").style.display = "none";
      isGameOver = false;
      placeFood();
      clearInterval(gameInterval);
      gameInterval = setInterval(update, 200);
      ctx.clearRect(0, 0, canvasSize, canvasSize);
      drawSnake();
      drawFood();
    }

    document.addEventListener("keydown", (e) => {
      if (isGameOver) return;
      switch (e.key) {
        case "ArrowUp":
        case "w":
        case "W":
          if (direction.y === 0) direction = { x: 0, y: -1 };
          break;
        case "ArrowDown":
        case "s":
        case "S":
          if (direction.y === 0) direction = { x: 0, y: 1 };
          break;
        case "ArrowLeft":
        case "a":
        case "A":
          if (direction.x === 0) direction = { x: -1, y: 0 };
          break;
        case "ArrowRight":
        case "d":
        case "D":
          if (direction.x === 0) direction = { x: 1, y: 0 };
          break;
      }
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });

    canvas.addEventListener("touchend", (e) => {
      if (isGameOver) return;

      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;

      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0 && direction.x === 0) {
          direction = { x: 1, y: 0 };
        } else if (dx < 0 && direction.x === 0) {
          direction = { x: -1, y: 0 };
        }
      } else {
        if (dy > 0 && direction.y === 0) {
          direction = { x: 0, y: 1 };
        } else if (dy < 0 && direction.y === 0) {
          direction = { x: 0, y: -1 };
        }
      }
    });

    restartGame();
  </script>

  <script>
    (function setupFullscreenBackFix() {
      const backButton = document.querySelector('.back-button');
      const tg = window.Telegram && window.Telegram.WebApp;
      if (!backButton || !tg) return;

      function handleBack() {
        if (window.history.length > 1) {
          window.history.back();
        } else {
          window.location.href = '/';
        }
      }

      function apply() {
        const safe = tg.contentSafeAreaInset || tg.safeAreaInset || {};
        const isFullscreen = tg.isFullscreen === true || (Number(safe.top) || 0) >= 24;
        backButton.style.display = isFullscreen ? 'none' : 'inline-flex';

        if (!tg.BackButton) return;
        if (typeof tg.BackButton.offClick === 'function') tg.BackButton.offClick(handleBack);
        if (isFullscreen) {
          if (typeof tg.BackButton.onClick === 'function') tg.BackButton.onClick(handleBack);
          if (typeof tg.BackButton.show === 'function') tg.BackButton.show();
        } else if (typeof tg.BackButton.hide === 'function') {
          tg.BackButton.hide();
        }
      }

      tg.ready();
      apply();
      setTimeout(apply, 150);
      setTimeout(apply, 500);

      if (tg.onEvent) {
        tg.onEvent('viewportChanged', apply);
        tg.onEvent('safeAreaChanged', apply);
        tg.onEvent('contentSafeAreaChanged', apply);
        tg.onEvent('fullscreenChanged', apply);
      }

      window.addEventListener('resize', apply, { passive: true });
      window.addEventListener('orientationchange', apply, { passive: true });
    })();
  </script>
</body>
</html>
