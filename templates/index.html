<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Minigames</title>
    <script>
      if (/iP(ad|hone|od)/.test(navigator.userAgent)) {
        document.documentElement.classList.add("ios");
      }
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      :root {
        --app-safe-top: max(env(safe-area-inset-top, 0px), var(--tg-safe-top, 0px));
        --app-safe-bottom: max(env(safe-area-inset-bottom, 0px), var(--tg-safe-bottom, 0px));
      }

      body {
        background: #0b0e33;
        color: #fff;
        min-height: 100dvh;
        position: relative;
        overflow-x: hidden;
      }

      .page-shell {
        position: relative;
        width: min(100%, 860px);
        margin: 0 auto;
        padding: calc(var(--app-safe-top) + 18px) clamp(18px, 4vw, 28px)
          calc(var(--app-safe-bottom) + 28px);
      }

      h1 {
        text-align: center;
        margin: 0;
        font-size: clamp(3.2rem, 8vw, 4.5rem);
        line-height: 1.05;
        letter-spacing: 2px;
      }

      .animation-background {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: -1;
      }

      .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        animation: float 20s linear infinite;
      }

      .circle:nth-child(1) {
        width: 150px;
        height: 150px;
        top: 10%;
        left: 15%;
      }

      .circle:nth-child(2) {
        width: 100px;
        height: 100px;
        top: 50%;
        left: 30%;
        animation-duration: 25s;
      }

      .circle:nth-child(3) {
        width: 200px;
        height: 200px;
        top: 20%;
        left: 70%;
        animation-duration: 30s;
      }

      .circle:nth-child(4) {
        width: 120px;
        height: 120px;
        top: 70%;
        left: 80%;
        animation-duration: 18s;
      }

      .circle:nth-child(5) {
        width: 80px;
        height: 80px;
        top: 80%;
        left: 25%;
        animation-duration: 22s;
      }

      @keyframes float {
        0% {
          transform: translate(0, 0);
        }
        50% {
          transform: translate(20px, -50px);
        }
        100% {
          transform: translate(0, 0);
        }
      }

      .game-list {
        margin: 28px auto 0;
        width: 100%;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
      }

      .game-item {
        position: relative;
        width: 100%;
        min-height: 108px;
        border-radius: 44px;
        overflow: hidden;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        text-transform: uppercase;
        font-size: 1.55rem;
        font-weight: bold;
        letter-spacing: 1px;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .game-item::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        filter: blur(4px) brightness(0.4);
        transition: filter 0.3s ease;
      }

      .game-item:hover {
        transform: scale(1.03);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      }

      .game-item:hover::before {
        filter: blur(2px) brightness(0.6);
      }

      .snake::before {
        background-image: url("images/snake.jpg");
      }

      .tetris::before {
        background-image: url("images/tetris.jpg");
      }

      .pong::before {
        background-image: url("images/pong.jpg");
      }

      .game2048::before {
        background-image: url("images/2048.jpg");
      }

      .minesweeper::before {
        background-image: url("images/minesweeper.jpg");
      }

      .game-link {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 108px;
        padding: 18px 20px;
        text-decoration: none;
        color: #fff;
        -webkit-tap-highlight-color: transparent;
      }

      @media screen and (max-width: 768px) {
        .page-shell {
          padding-top: calc(var(--app-safe-top) + 14px);
          padding-bottom: calc(var(--app-safe-bottom) + 24px);
        }

        h1 {
          font-size: clamp(2.9rem, 10vw, 3.8rem);
        }

        .game-list {
          margin-top: 24px;
          gap: 18px;
        }

        .game-item,
        .game-link {
          min-height: 96px;
          border-radius: 36px;
          font-size: 1.3rem;
        }
      }

      @media screen and (max-width: 480px) {
        .page-shell {
          padding-left: 16px;
          padding-right: 16px;
        }

        h1 {
          font-size: clamp(2.7rem, 11vw, 3.3rem);
        }

        .game-list {
          gap: 16px;
        }

        .game-item,
        .game-link {
          min-height: 88px;
          border-radius: 30px;
          font-size: 1.15rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="animation-background">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>

    <main class="page-shell">
      <h1>Minigames</h1>

      <div class="game-list">
        <div class="game-item snake">
          <a class="game-link" href="/snake.html">Змейка</a>
        </div>
        <div class="game-item tetris">
          <a class="game-link" href="/tetris.html">Тетрис</a>
        </div>
        <div class="game-item pong">
          <a class="game-link" href="/pong.html">Пинг понг</a>
        </div>
        <div class="game-item game2048">
          <a class="game-link" href="/2048.html">2048</a>
        </div>
        <div class="game-item minesweeper">
          <a class="game-link" href="/minesweeper.html">Сапёр</a>
        </div>
      </div>
    </main>
  </body>
</html>
